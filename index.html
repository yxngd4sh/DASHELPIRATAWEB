<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dash El Pirata</title>

<link href="https://fonts.googleapis.com/css2?family=Inter&family=Oswald&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #0A0A0A;
  color: white;
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

.hero {
  height: 100vh;
  background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.95)),
              url('./assets./dash.jpg') center/cover no-repeat;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.hero h1 {
  font-family: 'Oswald', sans-serif;
  font-size: 4rem;
  letter-spacing: 3px;
}

.btn {
  margin-top: 20px;
  padding: 15px 35px;
  border-radius: 40px;
  background: #D4AF37;
  color: black;
  text-decoration: none;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
  box-shadow: 0 0 20px #D4AF37;
}

.links a {
  display: block;
  margin: 12px auto;
  width: 80%;
  padding: 15px;
  border: 1px solid #D4AF37;
  border-radius: 30px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.links a:hover {
  background: #8B0000;
}

.release {
  text-align: center;
  padding: 60px 20px;
}

.release img {
  width: 220px;
  border-radius: 12px;
  transition: 0.3s;
}

.release img:hover {
  transform: scale(1.05);
}

footer {
  padding: 20px;
  text-align: center;
  opacity: 0.6;
}
</style>
</head>

<body>

<section class="hero">
  <h1>DASH EL PIRATA</h1>
  <p>Navegando el nuevo sonido</p>
  <a href="#" class="btn">Escuchar ahora</a>
</section>

<section class="links">
  <a href="https://open.spotify.com/intl-es/artist/21VRoqZKDrJuEoUtzEO5u6?si=z7KIdJJ_SKmbGl-AlTzOLA">Spotify</a>
  <a href="https://youtube.com/@dashelpirataoficial?si=ktKaI451scAB90Wo">YouTube</a>
  <a href="https://music.apple.com/es/artist/dash-el-pirata/1878518796">Apple Music</a>
  <a href="https://www.tiktok.com/@dashelpirata?is_from_webapp=1&sender_device=pc">TikTok</a>
  <a href="https://www.instagram.com/dashelpirata?igsh=MjNpNXk2a3Jra21n">Instagram</a>
</section>

<section class="release">
  <img src="./assets/cover.jpg">
  <h2>Último lanzamiento</h2>
  <a href="#" class="btn">Play</a>
</section>

<footer>
  © 2026 Dash El Pirata
</footer>

<script>
// simple fade-in effect
document.addEventListener("DOMContentLoaded", () => {
  document.body.style.opacity = 0;
  setTimeout(() => {
    document.body.style.transition = "opacity 1s";
    document.body.style.opacity = 1;
  }, 100);
});
</script>

</body>
</html>
